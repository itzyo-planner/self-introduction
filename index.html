<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자기소개서 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 40px 0 30px;
      color: white;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1rem;
      opacity: 0.85;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .card h2 {
      font-size: 1.2rem;
      color: #5a4fcf;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0eeff;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.8rem; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
    }

    input, select, textarea {
      border: 2px solid #e8e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
      color: #333;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .tag-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border: 2px solid #e8e8f0;
      border-radius: 10px;
      padding: 8px 10px;
      min-height: 46px;
      cursor: text;
      transition: border-color 0.2s;
    }

    .tag-input-wrapper:focus-within {
      border-color: #667eea;
    }

    .tag {
      background: #f0eeff;
      color: #5a4fcf;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag button {
      background: none;
      border: none;
      color: #9b8fd4;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }

    .tag-input-wrapper input {
      border: none;
      padding: 4px 6px;
      font-size: 0.9rem;
      flex: 1;
      min-width: 100px;
      outline: none;
    }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-generate:hover { opacity: 0.92; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .result-header h2 {
      margin-bottom: 0;
      border: none;
      padding: 0;
    }

    .btn-copy, .btn-download {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #667eea;
      transition: all 0.2s;
    }

    .btn-copy {
      background: white;
      color: #667eea;
    }

    .btn-download {
      background: #667eea;
      color: white;
      margin-left: 8px;
    }

    .btn-copy:hover { background: #f0eeff; }
    .btn-download:hover { opacity: 0.88; }

    .result-text {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 24px;
      font-size: 0.97rem;
      line-height: 1.9;
      color: #333;
      white-space: pre-wrap;
      min-height: 200px;
    }

    .char-count {
      text-align: right;
      font-size: 0.8rem;
      color: #999;
      margin-top: 8px;
    }

    .section-badge {
      display: inline-block;
      background: #f0eeff;
      color: #5a4fcf;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .api-notice {
      background: #fff8e1;
      border: 1px solid #ffd54f;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.85rem;
      color: #795548;
      margin-bottom: 20px;
    }

    .api-notice strong { color: #e65100; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>✍️ 자기소개서 생성기</h1>
    <p>나만의 맞춤형 자기소개서를 AI가 작성해드립니다</p>
  </header>

  <!-- 입력 폼 -->
  <div class="card">
    <span class="section-badge">📋 기본 정보</span>
    <div class="form-grid">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="name" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label>지원 직무</label>
        <input type="text" id="position" placeholder="프론트엔드 개발자" />
      </div>
      <div class="form-group">
        <label>지원 회사</label>
        <input type="text" id="company" placeholder="(주)테크스타트업" />
      </div>
      <div class="form-group">
        <label>경력 연차</label>
        <select id="career">
          <option value="신입">신입 (0년)</option>
          <option value="1~2년차">1~2년차</option>
          <option value="3~5년차">3~5년차</option>
          <option value="6~9년차">6~9년차</option>
          <option value="10년 이상">10년 이상</option>
        </select>
      </div>
      <div class="form-group full-width">
        <label>보유 기술 스택 (입력 후 Enter)</label>
        <div class="tag-input-wrapper" id="skillWrapper">
          <input type="text" id="skillInput" placeholder="React, Python, AWS..." />
        </div>
      </div>
      <div class="form-group full-width">
        <label>주요 경험 / 프로젝트</label>
        <textarea id="experience" placeholder="예) 쇼핑몰 앱 개발 (사용자 50만 달성), 결제 시스템 개선으로 속도 30% 향상 등"></textarea>
      </div>
      <div class="form-group full-width">
        <label>강점 / 어필 포인트</label>
        <textarea id="strengths" placeholder="예) 문제 해결 능력, 팀 커뮤니케이션, 빠른 학습력 등"></textarea>
      </div>
      <div class="form-group full-width">
        <label>지원 동기</label>
        <textarea id="motivation" placeholder="예) 해당 회사의 글로벌 서비스에 기여하고 싶어서..."></textarea>
      </div>
      <div class="form-group">
        <label>톤 & 스타일</label>
        <select id="tone">
          <option value="formal">공식적·전문적</option>
          <option value="friendly">친근하고 열정적</option>
          <option value="creative">창의적·개성있는</option>
          <option value="concise">간결하고 명확한</option>
        </select>
      </div>
      <div class="form-group">
        <label>글자 수 목표</label>
        <select id="length">
          <option value="600">약 600자 (간략)</option>
          <option value="1000" selected>약 1,000자 (표준)</option>
          <option value="1500">약 1,500자 (상세)</option>
          <option value="2000">약 2,000자 (심층)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- API 키 입력 -->
  <div class="card">
    <span class="section-badge">🔑 API 설정</span>
    <div class="api-notice">
      <strong>Claude API 키</strong>가 필요합니다. Anthropic Console에서 발급받은 키를 입력하세요.<br/>
      키는 브라우저에만 저장되며 서버로 전송되지 않습니다.
    </div>
    <div class="form-group">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generate()">
      ✨ 자기소개서 생성하기
    </button>
  </div>

  <!-- 결과 -->
  <div class="card result-card" id="resultCard">
    <div class="result-header">
      <h2>📄 생성된 자기소개서</h2>
      <div>
        <button class="btn-copy" onclick="copyText()">복사</button>
        <button class="btn-download" onclick="downloadText()">다운로드</button>
      </div>
    </div>
    <div class="result-text" id="resultText"></div>
    <div class="char-count" id="charCount"></div>
  </div>
</div>

<script>
  const skills = [];

  // 태그 입력
  document.getElementById('skillInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = this.value.trim().replace(/,$/, '');
      if (val && !skills.includes(val)) {
        skills.push(val);
        renderTags();
      }
      this.value = '';
    }
  });

  function renderTags() {
    const wrapper = document.getElementById('skillWrapper');
    const input = document.getElementById('skillInput');
    wrapper.querySelectorAll('.tag').forEach(t => t.remove());
    skills.forEach((s, i) => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = `${s} <button onclick="removeTag(${i})">×</button>`;
      wrapper.insertBefore(tag, input);
    });
  }

  function removeTag(i) {
    skills.splice(i, 1);
    renderTags();
  }

  document.getElementById('skillWrapper').addEventListener('click', function() {
    document.getElementById('skillInput').focus();
  });

  // API 키 로컬 저장
  const savedKey = localStorage.getItem('anthropic_api_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  document.getElementById('apiKey').addEventListener('change', function() {
    if (this.value) localStorage.setItem('anthropic_api_key', this.value);
  });

  async function generate() {
    const name = document.getElementById('name').value.trim();
    const position = document.getElementById('position').value.trim();
    const company = document.getElementById('company').value.trim();
    const career = document.getElementById('career').value;
    const experience = document.getElementById('experience').value.trim();
    const strengths = document.getElementById('strengths').value.trim();
    const motivation = document.getElementById('motivation').value.trim();
    const tone = document.getElementById('tone').value;
    const length = document.getElementById('length').value;
    const apiKey = document.getElementById('apiKey').value.trim();

    if (!name || !position) {
      alert('이름과 지원 직무는 필수 입력 항목입니다.');
      return;
    }
    if (!apiKey) {
      alert('Anthropic API 키를 입력해주세요.');
      return;
    }

    const toneMap = {
      formal: '공식적이고 전문적인',
      friendly: '친근하고 열정적인',
      creative: '창의적이고 개성있는',
      concise: '간결하고 명확한'
    };

    const prompt = `당신은 전문 자기소개서 작성 전문가입니다.
다음 정보를 바탕으로 ${toneMap[tone]} 톤으로 약 ${length}자 분량의 자기소개서를 작성해주세요.

[지원자 정보]
- 이름: ${name}
- 지원 직무: ${position}
- 지원 회사: ${company || '(미입력)'}
- 경력: ${career}
- 기술 스택: ${skills.length > 0 ? skills.join(', ') : '(미입력)'}
- 주요 경험/프로젝트: ${experience || '(미입력)'}
- 강점/어필 포인트: ${strengths || '(미입력)'}
- 지원 동기: ${motivation || '(미입력)'}

[작성 지침]
1. 자기소개, 지원 동기, 핵심 역량, 입사 후 포부 순으로 구성하세요.
2. 구체적인 수치나 성과가 있으면 적극 활용하세요.
3. 해당 직무와 회사에 맞는 맞춤형 내용으로 작성하세요.
4. 단락 구분을 명확히 하고 자연스럽게 연결하세요.
5. 자기소개서만 출력하고 추가 설명은 하지 마세요.`;

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 생성 중...';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-6',
          max_tokens: 2048,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data.content[0].text;

      document.getElementById('resultText').textContent = text;
      document.getElementById('charCount').textContent = `총 ${text.length.toLocaleString()}자`;
      const card = document.getElementById('resultCard');
      card.classList.add('show');
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      alert('오류가 발생했습니다: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ 자기소개서 생성하기';
    }
  }

  function copyText() {
    const text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '복사됨!';
      setTimeout(() => btn.textContent = '복사', 2000);
    });
  }

  function downloadText() {
    const text = document.getElementById('resultText').textContent;
    const name = document.getElementById('name').value || '지원자';
    const position = document.getElementById('position').value || '직무';
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${name}_${position}_자기소개서.txt`;
    a.click();
  }
</script>
</body>
</html>
